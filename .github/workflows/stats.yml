name: maj stats

on:
  schedule:
    - cron: '17 5 * * *'      # tous les jours, 05:17 UTC
  workflow_dispatch:           # + bouton "Run workflow" manuel

permissions:
  contents: write              # laisse le robot committer hero.svg dans CE repo

concurrency:
  group: stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Calcule le churn (clone lecture seule de tes repos)
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node stats/compute.mjs

      - name: Réinjecte les chiffres frais dans hero.svg
        run: node stats/build.mjs

      - name: Commit si quelque chose a changé
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hero.svg stats/stats.json
          git diff --staged --quiet || git commit -m "chore(stats): mise à jour automatique"
          git push
